<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABtime • Générateur de Ticket Wi-Fi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Courier New',monospace;min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0;padding:20px}.container{max-width:700px;margin:0 auto}.card{background:#1e293b;border-radius:20px;padding:25px;box-shadow:0 20px 60px rgba(0,0,0,.3);margin-bottom:20px;border:1px solid rgba(148,163,184,.2)}.header{display:flex;align-items:center;gap:15px;margin-bottom:25px}.logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center}.logo svg{width:35px;height:35px}.brand h2{font-size:1.5rem;color:white}.brand p{font-size:.85rem;color:#94a3b8}label{display:block;margin:15px 0 8px;font-weight:bold;color:#cbd5e1}input,select,textarea{width:100%;padding:14px;border:2px solid #334155;border-radius:12px;background:#0f172a;color:white;font-size:1rem;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.2)}.row{display:flex;gap:12px}.row > *{flex:1}.toggle-row{display:flex;align-items:center;gap:10px;margin:10px 0}.toggle-row input{width:auto}.password-wrapper{position:relative}.toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1.2rem}.preview-box{background:#0f172a;border:2px dashed #475569;border-radius:12px;padding:15px;margin:15px 0;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center}.preview-box img{max-width:100%;border-radius:8px}.btn{width:100%;padding:16px;border:none;border-radius:14px;color:white;font-weight:bold;cursor:pointer;font-size:1rem;margin:8px 0;transition:transform .2s}.btn:hover{transform:translateY(-2px)}.primary{background:linear-gradient(135deg,#7c3aed,#2563eb)}.secondary{background:linear-gradient(135deg,#64748b,#475569)}.success{background:linear-gradient(135deg,#10b981,#059669)}.result{display:none;margin-top:20px;padding:20px;background:#0f172a;border-radius:14px;border:1px solid #334155}.result.show{display:block}.result h3{margin-bottom:12px;color:#7c3aed}.result-url{word-break:break-all;background:#1e293b;padding:12px;border-radius:8px;margin:10px 0;font-size:.9rem;cursor:pointer}.result-url:hover{background:#334155}.history-list{max-height:300px;overflow-y:auto}.history-item{padding:12px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}.history-item:last-child{border-bottom:none}.history-actions button{padding:6px 12px;margin-left:5px;font-size:.85rem}.kofi{position:fixed;bottom:20px;right:20px;background:#ffdd00;color:#000;padding:12px 18px;border-radius:12px;text-decoration:none;font-weight:bold;box-shadow:0 8px 25px rgba(0,0,0,.3);z-index:100}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:12px 24px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;z-index:1000;pointer-events:none}.toast.show{opacity:1}@media(max-width:600px){.row{flex-direction:column}}
</style>
</head>
<body>
<div class="container"><div class="card"><div class="header"><div class="logo"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="white" opacity=".2"/><path d="M28 62 L40 35 L50 55 L60 28 L72 62" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="50" r="6" fill="white"/></svg></div><div class="brand"><h2>ABtime</h2><p>Générateur de Ticket Wi-Fi</p></div></div>
<label>📶 SSID</label><input type="text" id="ssid" placeholder="MonWiFi" maxlength="32">
<label>🔐 Mot de passe</label><div class="password-wrapper"><input type="password" id="password" placeholder="********" maxlength="63"><button class="toggle-pwd" id="togglePwd">👁</button></div><small style="color:#94a3b8">WPA2 : 8-63 caractères ou 64 hex</small>
<label>⏳ Expiration</label><div class="row"><select id="expType"><option value="duration">Durée</option><option value="time">Heure fixe</option></select><select id="expValue"><option value="15">15 min</option><option value="30">30 min</option><option value="60" selected>1h</option><option value="180">3h</option><option value="360">6h</option><option value="720">12h</option><option value="1440">24h</option></select></div>
<label>🎨 Personnalisation</label><div class="toggle-row"><input type="checkbox" id="enableCustom"><span>Activer options avancées</span></div><div id="customOptions" style="display:none"><label>🏷️ Message</label><input type="text" id="welcomeMsg" placeholder="Bienvenue !" maxlength="100"><label>🖼️ Logo URL</label><input type="url" id="logoUrl" placeholder="https://.../logo.png"><label>🎨 Couleur</label><input type="color" id="themeColor" value="#7c3aed" style="height:45px"><label>👁️ Aperçu</label><div class="preview-box" id="logoPreview">Aucun logo</div></div>
<label>⚙️ Options</label><div class="toggle-row"><input type="checkbox" id="useShortener" checked><span>Raccourcir (TinyURL)</span></div><div class="toggle-row"><input type="checkbox" id="saveHistory" checked><span>Sauvegarder historique</span></div>
<button class="btn primary" id="generateBtn">🎫 Générer</button><button class="btn secondary" id="demoBtn">🧪 Démo 3min</button>
<div class="result" id="result"><h3>✅ Ticket généré !</h3><p style="color:#94a3b8;margin:10px 0">Cliquez pour copier :</p><div class="result-url" id="resultUrl">Chargement...</div><button class="btn success" id="copyBtn">📋 Copier</button><button class="btn secondary" id="openBtn">🔗 Ouvrir</button></div></div>
<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:15px"><h3 style="color:white">📜 Historique</h3><button class="btn secondary" style="width:auto;padding:8px 16px" id="clearHistory">Effacer</button></div><div class="history-list" id="historyList"><p style="color:#64748b;text-align:center">Aucun ticket</p></div></div></div>

<!-- WATERMARK ABTIME -->
<div style="font-size:12px;opacity:0.55;margin-top:12px;color:#94a3b8;text-align:center;">Powered by ABtime</div>

<div class="toast" id="toast">Copié !</div><a href="https://ko-fi.com/sellerfit" target="_blank" class="kofi">☕ Ko-fi</a>

<script>
const CONFIG={SHORTENER_API:'https://tinyurl.com/api-create.php?url=',BASE_URL:window.location.href.replace(/generator\.html.*/,''),CONNECT_PAGE:'connect.html',HISTORY_KEY:'abtime_history',MAX_HISTORY:20};
const $=id=>document.getElementById(id);
const showToast=msg=>{const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);};
const validatePwd=pwd=>{if(pwd.length===64&&/^[0-9A-Fa-f]{64}$/.test(pwd))return true;if(pwd.length>=8&&pwd.length<=63&&/^[\x20-\x7E]+$/.test(pwd))return true;return false;};
const escapeHtml=str=>{const d=document.createElement('div');d.textContent=str;return d.innerHTML;};
const Crypto={async generateKey(){return await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);},async exportKey(k){const r=await crypto.subtle.exportKey('raw',k);return this.toBase64(new Uint8Array(r));},async importKey(b64){return await crypto.subtle.importKey('raw',this.fromBase64(b64),{name:'AES-GCM'},false,['decrypt']);},async encrypt(k,data){const iv=crypto.getRandomValues(new Uint8Array(12)),enc=new TextEncoder().encode(JSON.stringify(data)),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,enc),comb=new Uint8Array(iv.length+ct.byteLength);comb.set(iv);comb.set(new Uint8Array(ct),iv.length);return comb;},async decrypt(k,comb){const arr=new Uint8Array(comb),iv=arr.slice(0,12),ct=arr.slice(12),dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},k,ct);return JSON.parse(new TextDecoder().decode(dec));},toBase64(buf){let b='';buf.forEach(c=>b+=String.fromCharCode(c));return btoa(b);},fromBase64(b64){const bin=atob(b64),buf=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;}};
const Signature={key:null,async init(){const enc=new TextEncoder();this.key=await crypto.subtle.importKey('raw',enc.encode('K9#mP2$vL5@nQ8!rT1&wY4^jH7*bC0+zF3%hR6'),{name:'HMAC',hash:'SHA-256'},false,['sign','verify']);},async sign(data){const enc=new TextEncoder(),sig=await crypto.subtle.sign('HMAC',this.key,enc.encode(data));return Crypto.toBase64(new Uint8Array(sig));},async verify(data,sig){return await this.sign(data)===sig;}};
const History={load(){try{return JSON.parse(localStorage.getItem(CONFIG.HISTORY_KEY)||'[]');}catch{return[];}},save(e){const l=this.load();l.unshift({...e,id:Date.now(),date:new Date().toISOString()});while(l.length>CONFIG.MAX_HISTORY)l.pop();localStorage.setItem(CONFIG.HISTORY_KEY,JSON.stringify(l));this.render();},remove(id){const l=this.load().filter(i=>i.id!=id);localStorage.setItem(CONFIG.HISTORY_KEY,JSON.stringify(l));this.render();},clear(){localStorage.removeItem(CONFIG.HISTORY_KEY);this.render();},render(){const list=$('historyList'),items=this.load();if(!items.length){list.innerHTML='<p style="color:#64748b;text-align:center">Aucun ticket</p>';return;}list.innerHTML=items.map(i=>`<div class="history-item"><div><strong style="color:white">${escapeHtml(i.ssid)}</strong><div style="font-size:.85rem;color:#94a3b8">${new Date(i.date).toLocaleString('fr-FR')}</div></div><div><button class="btn secondary" onclick="History.reuse(${i.id})" style="padding:6px 12px">🔄</button><button class="btn" style="background:#ef4444;padding:6px 12px" onclick="History.remove(${i.id})">🗑️</button></div></div>`).join('');},reuse(id){const it=this.load().find(i=>i.id==id);if(it){$('ssid').value=it.ssid;$('password').value=it.password;$('expType').value=it.expType;$('expValue').value=it.expValue;if(it.custom){$('enableCustom').checked=true;$('customOptions').style.display='block';$('welcomeMsg').value=it.welcomeMsg||'';$('logoUrl').value=it.logoUrl||'';$('themeColor').value=it.themeColor||'#7c3aed';}window.scrollTo({top:0,behavior:'smooth'});}}};
const UrlShortener={async shorten(url){if(!CONFIG.SHORTENER_API)return url;try{const c=new AbortController(),t=setTimeout(()=>c.abort(),8000),r=await fetch(CONFIG.SHORTENER_API+encodeURIComponent(url),{signal:c.signal});clearTimeout(t);if(r.ok){const s=await r.text();if(s&&s.trim().startsWith('http'))return s.trim();}}catch(e){console.warn('Shortener error:',e.message);}return url;}};
async function generateTicket(demo=false){const ssid=$('ssid').value.trim(),pwd=$('password').value.trim();if(!ssid||!pwd){alert('⚠️ SSID et mot de passe requis');return;}if(!validatePwd(pwd)&&!confirm('⚠️ Mot de passe non conforme WPA2. Continuer ?'))return;const expT=$('expType').value,expV=parseInt($('expValue').value),exp=demo?Date.now()+180000:(expT==='duration'?Date.now()+expV*60000:(()=>{const d=new Date();d.setHours(d.getHours()+expV);return d.getTime()})()),custom=$('enableCustom').checked,payload={ssid,password:pwd,exp,custom,welcomeMsg:custom?$('welcomeMsg').value.trim():'',logoUrl:custom?$('logoUrl').value.trim():'',themeColor:custom?$('themeColor').value:'#7c3aed',v:'2.0'};const key=await Crypto.generateKey(),enc=await Crypto.encrypt(key,payload),k64=await Crypto.exportKey(key),d64=Crypto.toBase64(new Uint8Array(enc)),sig=await Signature.sign(k64+':'+d64),longUrl=`${CONFIG.BASE_URL}${CONFIG.CONNECT_PAGE}#${k64}:::${d64}:::${sig}`;$('resultUrl').textContent='🔄...';const final=await UrlShortener.shorten(longUrl);$('resultUrl').textContent=final;$('result').classList.add('show');if($('saveHistory').checked)History.save({ssid,password:pwd,expType:expT,expValue:expV,custom,welcomeMsg:payload.welcomeMsg,logoUrl:payload.logoUrl,themeColor:payload.themeColor,url:final,short:final!==longUrl});showToast(final===longUrl?'Généré (lien long)':'Généré (URL courte) !');}
document.addEventListener('DOMContentLoaded',async()=>{await Signature.init();History.render();$('togglePwd').onclick=()=>{const p=$('password');p.type=p.type==='password'?'text':'password';$('togglePwd').textContent=p.type==='password'?'👁':'🙈';};$('enableCustom').onchange=e=>{$('customOptions').style.display=e.target.checked?'block':'none';};$('logoUrl').oninput=e=>{$('logoPreview').innerHTML=e.target.value?`<img src="${escapeHtml(e.target.value)}" onerror="this.parentElement.textContent='❌'">`:'Aucun logo';};$('generateBtn').onclick=()=>generateTicket(false);$('demoBtn').onclick=()=>generateTicket(true);$('copyBtn').onclick=()=>navigator.clipboard.writeText($('resultUrl').textContent).then(()=>showToast('Copié !'));$('openBtn').onclick=()=>window.open($('resultUrl').textContent,'_blank');$('clearHistory').onclick=()=>{if(confirm('Effacer tout ?'))History.clear();};$('resultUrl').onclick=()=>navigator.clipboard.writeText($('resultUrl').textContent).then(()=>showToast('Copié !'));if(location.hash==='#demo'){$('ssid').value='ABtime_Demo';$('password').value='Demo2026!';generateTicket(true);}});
window.History=History;
</script>
</body>
</html>
