<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wi-Fi Ticket · Générateur</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #0f172a, #7c3aed);
    }

    .ticket {
      width: 100%;
      max-width: 520px;
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,.35);
    }

    h1 {
      text-align: center;
      color: #4c1d95;
      margin-bottom: 10px;
    }

    .subhead {
      text-align: center;
      margin-bottom: 24px;
      color: #64748b;
      font-size: .85rem;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-family: inherit;
    }

    .expiry-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
    }

    .btn.secondary {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
    }

    #previewUrl {
      margin-top: 18px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      display: none;
      word-break: break-all;
      cursor: pointer;
    }

    #ticketQr {
      margin-top: 18px;
      text-align: center;
    }

    #ticketQr img {
      max-width: 180px;
    }
  </style>
</head>
<body>

  <div class="ticket">
    <h1>🎫 WIFI TICKET</h1>
    <div class="subhead">ÉDITION LIMITÉE · EXPIRATION AUTO</div>

    <div class="input-group">
      <label>📶 SSID</label>
      <input type="text" id="ssid" value="MonWiFi">
    </div>

    <div class="input-group">
      <label>🔐 Mot de passe</label>
      <input type="text" id="password" value="BienvenueChezMoi">
    </div>

    <div class="input-group">
      <label>⏳ Expire à</label>
      <div class="expiry-row">
        <select id="expiryHour"></select>
        <span>H</span>
        <select id="expiryMinute">
          <option value="0">00</option>
          <option value="15">15</option>
          <option value="30">30</option>
          <option value="45">45</option>
        </select>
      </div>
    </div>

    <button class="btn" id="generateBtn">
      🎫 GÉNÉRER LE TICKET
    </button>

    <button class="btn secondary" id="demoBtn">
      🧪 DÉMO (3 min)
    </button>

    <div id="previewUrl"></div>
    <div id="ticketQr"></div>
  </div>

  <script>
    (() => {
      const hourSelect = document.getElementById('expiryHour');
      const preview = document.getElementById('previewUrl');
      const qrContainer = document.getElementById('ticketQr');

      for (let h = 0; h < 24; h++) {
        const option = document.createElement('option');
        option.value = h;
        option.textContent = String(h).padStart(2, '0');
        hourSelect.appendChild(option);
      }

      hourSelect.value = '23';

      function toBase64(buffer) {
        return btoa(String.fromCharCode(...buffer));
      }

      async function generateKey() {
        return crypto.subtle.generateKey(
          {
            name: 'AES-GCM',
            length: 256
          },
          true,
          ['encrypt', 'decrypt']
        );
      }

      async function exportKey(key) {
        const raw = await crypto.subtle.exportKey('raw', key);
        return toBase64(new Uint8Array(raw));
      }

      async function encryptData(key, text) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encoded = new TextEncoder().encode(text);

        const encrypted = await crypto.subtle.encrypt(
          {
            name: 'AES-GCM',
            iv
          },
          key,
          encoded
        );

        const result = new Uint8Array(iv.length + encrypted.byteLength);
        result.set(iv, 0);
        result.set(new Uint8Array(encrypted), iv.length);

        return result;
      }

      function getExpiry(hour, minute) {
        const d = new Date();
        d.setHours(hour, minute, 0, 0);
        return d.getTime();
      }

      function generateLinkQR(link) {
        const qr = qrcode(0, 'M');
        qr.addData(link);
        qr.make();

        qrContainer.innerHTML = qr.createImgTag(5);
      }

      async function createTicketLink(ssid, pwd, expiry) {
        const payload = JSON.stringify({
          ssid,
          pwd,
          exp: expiry
        });

        const key = await generateKey();
        const encrypted = await encryptData(key, payload);

        const key64 = await exportKey(key);
        const data64 = toBase64(encrypted);

        const base = window.location.href.replace(/index\.html$/, '');

        return `${base}connect.html#${key64}:${data64}`;
      }

      async function generateTicket(demo = false) {
        const ssid = document.getElementById('ssid').value.trim();
        const pwd = document.getElementById('password').value.trim();

        if (!ssid || !pwd) {
          alert('Veuillez remplir tous les champs');
          return;
        }

        const expiry = demo
          ? Date.now() + 3 * 60 * 1000
          : getExpiry(
              parseInt(hourSelect.value),
              parseInt(document.getElementById('expiryMinute').value)
            );

        const link = await createTicketLink(ssid, pwd, expiry);

        preview.style.display = 'block';
        preview.innerHTML = link;

        generateLinkQR(link);

        preview.onclick = () => {
          navigator.clipboard.writeText(link)
            .then(() => alert('Lien copié !'));
        };
      }

      document.getElementById('generateBtn')
        .addEventListener('click', () => generateTicket(false));

      document.getElementById('demoBtn')
        .addEventListener('click', () => generateTicket(true));
    })();
  </script>

</body>
</html>
