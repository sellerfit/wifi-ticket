<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Wi-Fi Ticket · Édition Apéro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #2b2b2b; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', Courier, monospace; padding: 16px; margin: 0; }
        .ticket { max-width: 500px; width: 100%; background: #f9f6f0; padding: 30px 20px 25px; border-radius: 8px; box-shadow: 0 12px 28px rgba(0,0,0,0.4); border: 1px solid #d9cdb3; position: relative; }
        .ticket::before, .ticket::after { content: ""; position: absolute; left: 10px; right: 10px; height: 4px; background: repeating-linear-gradient(90deg, #b9aa8f, #b9aa8f 8px, transparent 8px, transparent 16px); }
        .ticket::before { top: 12px; } .ticket::after { bottom: 12px; }
        h1 { font-family: 'Courier New', Courier, monospace; font-size: 2.2rem; font-weight: 700; text-align: center; color: #2c2c2c; text-transform: uppercase; border-bottom: 2px dashed #aa9f8a; padding-bottom: 10px; margin-bottom: 20px; }
        .subhead { text-align: center; font-size: 0.8rem; color: #5f5544; margin-top: -15px; margin-bottom: 25px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; color: #3e3a32; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #fffcf5; border: 1.5px solid #bfb6a4; font-family: 'Courier New', Courier, monospace; font-size: 1rem; }
        .expiry-row { display: flex; gap: 10px; align-items: center; }
        .expiry-row select, .expiry-row input { flex: 1; }
        .hint { font-size: 0.7rem; color: #6a5e4e; margin-top: 4px; text-align: right; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin: 30px 0 20px; }
        .btn { background: #e5dccc; border: 2px solid #8f8473; padding: 14px; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; color: #1f1e1b; box-shadow: 3px 3px 0 #7b6f5e; cursor: pointer; text-align: center; }
        .btn.secondary { background: #cfc4b2; box-shadow: 2px 2px 0 #6b5f50; font-size: 1rem; }
        .demo-area { margin-top: 10px; text-align: center; border-top: 1px dashed #b9aa8f; padding-top: 20px; }
        #previewUrl { background: #e7dfd1; padding: 12px; font-size: 0.75rem; word-break: break-all; border: 1px dashed #7b6f5e; margin-top: 15px; display: none; }
    </style>
</head>
<body>
<div class="ticket">
    <h1>WIFI TICKET</h1><div class="subhead">ÉDITION LIMITÉE · EXPIRATION AUTO</div>
    <div class="input-group"><label>📶 SSID (Nom du réseau)</label><input type="text" id="ssid" placeholder="Livebox-1234" value="MonWiFi"></div>
    <div class="input-group"><label>🔐 Mot de passe</label><input type="text" id="password" placeholder="Apéro2026!" value="BienvenueChezMoi"></div>
    <div class="input-group"><label>⏳ Expire à</label><div class="expiry-row"><select id="expiryHour" style="background:#fffcf5; border:1.5px solid #bfb6a4; padding:12px; font-family:monospace;"></select><span>H</span><select id="expiryMinute" style="background:#fffcf5; border:1.5px solid #bfb6a4; padding:12px; font-family:monospace;"><option value="0">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option></select></div><div class="hint">Le lien deviendra inactif après cette heure.</div></div>
    <div class="action-buttons"><button class="btn" id="generateBtn">🎫 GÉNÉRER LE TICKET</button></div>
    <div id="previewUrl"></div>
    <div class="demo-area"><button class="btn secondary" id="demoBtn">🧪 DÉMO (expire dans 3 min)</button><div class="footer-note">SCANNEZ · CONNECTÉ · ZÉRO SERVEUR</div></div>
</div>
<script>
    (function() {
        const hourSelect = document.getElementById('expiryHour');
        for (let h=0;h<24;h++){ let o=document.createElement('option'); o.value=h; o.textContent=h.toString().padStart(2,'0'); hourSelect.appendChild(o); }
        hourSelect.value='23';
        async function generateKey(){ return await window.crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]); }
        async function encryptData(key,plaintext){ const iv=window.crypto.getRandomValues(new Uint8Array(12)); const enc=new TextEncoder().encode(plaintext); const cipher=await window.crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc); const combined=new Uint8Array(iv.length+cipher.byteLength); combined.set(iv,0); combined.set(new Uint8Array(cipher),iv.length); return combined; }
        async function exportKey(key){ const exp=await window.crypto.subtle.exportKey("raw",key); return btoa(String.fromCharCode(...new Uint8Array(exp))); }
        function arrayBufferToBase64(b){ return btoa(String.fromCharCode(...new Uint8Array(b))); }
        async function createEncryptedLink(ssid,pwd,expiry){ const payload=JSON.stringify({ssid:ssid,pwd:pwd,exp:expiry}); const key=await generateKey(); const encBuf=await encryptData(key,payload); const encB64=arrayBufferToBase64(encBuf); const keyB64=await exportKey(key); const base=window.location.href.replace(/index\.html$/,'').replace(/\/$/,''); return base+'/connect.html#'+keyB64+':'+encB64; }
        function getExpiryTimestamp(h,m){ const d=new Date(); d.setHours(h,m,0,0); return d.getTime(); }
        function getDemoExpiry(){ return Date.now()+3*60*1000; }
        async function generateAndShow(demo){ let ssid=document.getElementById('ssid').value.trim(), pwd=document.getElementById('password').value.trim(); if(!ssid||!pwd){alert('Remplissez SSID et mot de passe');return;} let exp=demo?getDemoExpiry():getExpiryTimestamp(parseInt(hourSelect.value),parseInt(document.getElementById('expiryMinute').value)); try{ const link=await createEncryptedLink(ssid,pwd,exp); const prev=document.getElementById('previewUrl'); prev.style.display='block'; prev.innerHTML='<div style="margin-bottom:8px;">🔗 LIEN (cliquez pour copier)</div><div style="background:#f4ede1; padding:10px; border:1px solid #a79b88; word-break:break-all;" id="copyLink">'+link+'</div>'; document.getElementById('copyLink').addEventListener('click',function(){ navigator.clipboard?.writeText(link).then(()=>alert('Copié !')).catch(()=>prompt('Copie manuelle:',link)); }); }catch(e){alert('Erreur: '+e);} }
        document.getElementById('generateBtn').addEventListener('click',()=>generateAndShow(false));
        document.getElementById('demoBtn').addEventListener('click',()=>generateAndShow(true));
    })();
</script>
</body>
</html>
