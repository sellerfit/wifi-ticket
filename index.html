<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABtime • Wi-Fi Ticket Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    font-family:Inter,Segoe UI,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#7c3aed);
    background-size:300% 300%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.app{
    width:100%;
    max-width:620px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.35);
    border-radius:28px;
    padding:40px;
    box-shadow:0 30px 80px rgba(0,0,0,0.35);
    animation:fadeUp .7s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.brand{
    text-align:center;
    margin-bottom:30px;
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
}

.brand-name{
    font-size:2rem;
    font-weight:800;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-top:10px;
}

.subtitle{
    font-size:.9rem;
    color:#64748b;
    margin-top:8px;
}

h1{
    text-align:center;
    font-size:1.6rem;
    margin-bottom:30px;
    color:#1e293b;
}

.field{
    margin-bottom:22px;
}

label{
    display:block;
    font-weight:700;
    margin-bottom:8px;
    color:#334155;
}

input,select{
    width:100%;
    padding:16px;
    border-radius:16px;
    border:2px solid #e2e8f0;
    background:#f8fafc;
    font-size:1rem;
    transition:.25s;
}

input:focus,
select:focus{
    outline:none;
    border-color:#7c3aed;
    box-shadow:0 0 0 5px rgba(124,58,237,0.15);
}

.password-box{
    position:relative;
}

.toggle-btn{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    font-size:1rem;
}

.time-box{
    display:flex;
    align-items:center;
    gap:14px;
}

.time-box select{
    flex:1;
    text-align:center;
    font-size:1.1rem;
}

.separator{
    font-size:1.5rem;
    font-weight:bold;
    color:#64748b;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    margin-top:14px;
    transition:.25s;
}

.primary{
    color:white;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.secondary{
    color:white;
    background:linear-gradient(135deg,#f59e0b,#ef4444);
}

.btn:hover{
    transform:translateY(-2px);
}

#previewBox{
    display:none;
    margin-top:22px;
    padding:18px;
    border-radius:18px;
    background:#f8fafc;
    border:2px solid #7c3aed;
}

.link-box{
    background:white;
    border:1px solid #e2e8f0;
    padding:14px;
    border-radius:14px;
    word-break:break-all;
    margin-top:10px;
    font-size:.85rem;
}

.copy-btn{
    margin-top:12px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    font-weight:700;
    cursor:pointer;
}

.copy-btn.success{
    background:#16a34a;
}

.kofi-float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ffdd00;
    color:black;
    padding:14px 18px;
    border-radius:16px;
    text-decoration:none;
    font-weight:800;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    z-index:999;
}
</style>
</head>
<body>

<div class="app">

    <div class="brand">
        <svg class="logo" viewBox="0 0 100 100">
            <defs>
                <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#7c3aed"/>
                    <stop offset="100%" stop-color="#2563eb"/>
                </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="45" fill="url(#abg)">
                <animate attributeName="r" values="45;47;45" dur="2.5s" repeatCount="indefinite"/>
            </circle>
            <path d="M28 62 L40 35 L50 55 L60 28 L72 62"
                  fill="none"
                  stroke="white"
                  stroke-width="6"
                  stroke-linecap="round"
                  stroke-linejoin="round"/>
        </svg>

        <div class="brand-name">ABtime</div>
        <div class="subtitle">Secure Wi-Fi Ticket Generator</div>
    </div>

    <h1>🎫 Générateur SaaS Premium</h1>

    <div class="field">
        <label>📶 Nom du réseau</label>
        <input type="text" id="ssid" value="MonWiFi">
    </div>

    <div class="field">
        <label>🔐 Mot de passe</label>
        <div class="password-box">
            <input type="password" id="password" value="BienvenueChezMoi">
            <button class="toggle-btn" id="togglePwd">👁</button>
        </div>
    </div>

    <div class="field">
        <label>⏳ Expiration</label>
        <div class="time-box">
            <select id="hour"></select>
            <div class="separator">:</div>
            <select id="minute">
                <option value="0">00</option>
                <option value="15">15</option>
                <option value="30">30</option>
                <option value="45">45</option>
            </select>
        </div>
    </div>

    <button class="btn primary" id="generateBtn">
        🎫 Générer Ticket
    </button>

    <button class="btn secondary" id="demoBtn">
        🧪 Démo 3 min
    </button>

    <div id="previewBox">
        <strong>🔗 Lien généré</strong>
        <div class="link-box" id="linkOutput"></div>
        <button class="copy-btn" id="copyBtn">📋 Copier le lien</button>
    </div>

</div>

<a href="https://sellerfit.github.io/wifi-ticket/" target="_blank" class="kofi-float">
☕ Ko-fi
</a>

<script>
(function(){

const hour=document.getElementById('hour');

for(let h=0;h<24;h++){
    const option=document.createElement('option');
    option.value=h;
    option.textContent=String(h).padStart(2,'0');
    hour.appendChild(option);
}

hour.value='23';

document.getElementById('togglePwd').onclick=()=>{
    const pwd=document.getElementById('password');
    pwd.type=pwd.type==='password'?'text':'password';
};

async function generateKey(){
    return await crypto.subtle.generateKey(
        {name:"AES-GCM",length:256},
        true,
        ["encrypt","decrypt"]
    );
}

function toBase64(buffer){
    return btoa(String.fromCharCode(...buffer));
}

async function exportKey(key){
    const raw=await crypto.subtle.exportKey("raw",key);
    return toBase64(new Uint8Array(raw));
}

async function encryptData(key,text){
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const encoded=new TextEncoder().encode(text);

    const encrypted=await crypto.subtle.encrypt(
        {name:"AES-GCM",iv},
        key,
        encoded
    );

    const combined=new Uint8Array(iv.length+encrypted.byteLength);
    combined.set(iv,0);
    combined.set(new Uint8Array(encrypted),iv.length);

    return combined;
}

async function createLink(ssid,pwd,exp){
    const payload=JSON.stringify({ssid,pwd,exp});
    const key=await generateKey();
    const encrypted=await encryptData(key,payload);

    const key64=await exportKey(key);
    const data64=toBase64(encrypted);

    const base=window.location.href
        .replace(/index\.html$/,'')
        .replace(/\/$/,'');

    return `${base}/connect.html#${key64}:${data64}`;
}

function getExpiry(){
    const d=new Date();
    d.setHours(
        parseInt(hour.value),
        parseInt(document.getElementById('minute').value),
        0,0
    );
    return d.getTime();
}

async function generate(demo=false){
    const ssid=document.getElementById('ssid').value.trim();
    const pwd=document.getElementById('password').value.trim();

    const exp=demo
        ? Date.now()+180000
        : getExpiry();

    const link=await createLink(ssid,pwd,exp);

    document.getElementById('previewBox').style.display='block';
    document.getElementById('linkOutput').textContent=link;

    const copyBtn=document.getElementById('copyBtn');

    copyBtn.onclick=async()=>{
        await navigator.clipboard.writeText(link);
        copyBtn.textContent='✅ Copié';
        copyBtn.classList.add('success');

        setTimeout(()=>{
            copyBtn.textContent='📋 Copier le lien';
            copyBtn.classList.remove('success');
        },2000);
    };
}

document.getElementById('generateBtn').onclick=()=>generate(false);
document.getElementById('demoBtn').onclick=()=>generate(true);

})();
</script>

</body>
</html>
