<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Wi-Fi Ticket · Édition Apéro</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 40%,#7c3aed 100%);
    background-size:200% 200%;
    animation:bgMove 10s ease infinite;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Courier New', Courier, monospace;
    padding:16px;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.ticket{
    max-width:500px;
    width:100%;
    background:white;
    padding:30px 20px;
    border-radius:20px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    margin-top:10px;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.btn.secondary{
    background:linear-gradient(135deg,#f59e0b,#ef4444);
}

#previewUrl{
    margin-top:15px;
    display:none;
    padding:12px;
    border:1px solid #7c3aed;
    border-radius:12px;
    word-break:break-all;
}
</style>
</head>
<body>

<div class="ticket">

    <h1>WIFI TICKET</h1>

    <input type="text" id="ssid" value="MonWiFi">
    <input type="text" id="password" value="BienvenueChezMoi">

    <select id="expiryHour"></select>

    <select id="expiryMinute">
        <option value="0">00</option>
        <option value="15">15</option>
        <option value="30">30</option>
        <option value="45">45</option>
    </select>

    <button class="btn" id="generateBtn">🎫 GÉNÉRER</button>
    <button class="btn secondary" id="demoBtn">🧪 DÉMO</button>

    <div id="previewUrl"></div>

</div>

<script>
(function(){

    const hourSelect=document.getElementById('expiryHour');

    for(let h=0;h<24;h++){
        let o=document.createElement('option');
        o.value=h;
        o.textContent=h.toString().padStart(2,'0');
        hourSelect.appendChild(o);
    }

    hourSelect.value='23';

    async function generateKey(){
        return await crypto.subtle.generateKey(
            {name:"AES-GCM",length:256},
            true,
            ["encrypt","decrypt"]
        );
    }

    async function encryptData(key,text){
        const iv=crypto.getRandomValues(new Uint8Array(12));
        const enc=new TextEncoder().encode(text);

        const cipher=await crypto.subtle.encrypt(
            {name:"AES-GCM",iv},
            key,
            enc
        );

        const combined=new Uint8Array(iv.length+cipher.byteLength);

        combined.set(iv,0);
        combined.set(new Uint8Array(cipher),iv.length);

        return combined;
    }

    function toBase64(buffer){
        return btoa(String.fromCharCode(...buffer));
    }

    async function exportKey(key){
        const raw=await crypto.subtle.exportKey("raw",key);
        return toBase64(new Uint8Array(raw));
    }

    function getExpiryTimestamp(h,m){
        const d=new Date();
        d.setHours(h,m,0,0);
        return d.getTime();
    }

    function getDemoExpiry(){
        return Date.now()+3*60*1000;
    }

    async function createEncryptedLink(ssid,pwd,expiry){

        const payload=JSON.stringify({
            ssid,
            pwd,
            exp:expiry
        });

        const key=await generateKey();
        const encrypted=await encryptData(key,payload);

        const encB64=toBase64(encrypted);
        const keyB64=await exportKey(key);

        const base=window.location.href
            .replace(/index\.html$/,'')
            .replace(/\/$/,'');

        return base+'/connect.html#'+keyB64+':'+encB64;
    }

    async function generateAndShow(demo){

        const ssid=document.getElementById('ssid').value.trim();
        const pwd=document.getElementById('password').value.trim();

        if(!ssid||!pwd){
            alert('Remplissez SSID et mot de passe');
            return;
        }

        const exp=demo
            ? getDemoExpiry()
            : getExpiryTimestamp(
                parseInt(hourSelect.value),
                parseInt(document.getElementById('expiryMinute').value)
            );

        try{
            const link=await createEncryptedLink(ssid,pwd,exp);

            const prev=document.getElementById('previewUrl');

            prev.style.display='block';
            prev.innerHTML=link;

            prev.onclick=()=>{
                navigator.clipboard.writeText(link)
                    .then(()=>alert('Copié !'));
            };

        }catch(e){
            alert('Erreur: '+e);
        }
    }

    document.getElementById('generateBtn')
        .addEventListener('click',()=>generateAndShow(false));

    document.getElementById('demoBtn')
        .addEventListener('click',()=>generateAndShow(true));

})();
</script>

</body>
</html>
