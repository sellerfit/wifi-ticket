<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABtime • Wi-Fi Ticket</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#7c3aed);
    font-family:'Courier New', monospace;
    padding:20px;
}

.ticket{
    width:100%;
    max-width:560px;
    background:white;
    border-radius:22px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.brand-header{
    text-align:center;
    margin-bottom:24px;
}

.brand-name{
    font-size:1.6rem;
    font-weight:800;
    letter-spacing:1px;
    text-transform:uppercase;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.brand-tagline{
    font-size:0.78rem;
    color:#64748b;
    margin-top:6px;
    text-transform:uppercase;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#4c1d95;
    font-size:1.8rem;
}

.input-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#334155;
}

.input-box{
    position:relative;
}

input,
select{
    width:100%;
    padding:16px;
    border:2px solid #cbd5e1;
    border-radius:14px;
    font-size:1rem;
    background:#f8fafc;
}

.password-toggle{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
}

.expiry-row{
    display:flex;
    gap:12px;
    align-items:center;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:12px;
    font-size:1rem;
}

.primary{
    background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.secondary{
    background:linear-gradient(135deg,#f59e0b,#ef4444);
}

#previewUrl{
    margin-top:20px;
    display:none;
    background:#f8fafc;
    border:2px solid #7c3aed;
    padding:14px;
    border-radius:14px;
    word-break:break-all;
    cursor:pointer;
}

.support-box{
    margin-top:28px;
    padding-top:18px;
    border-top:1px dashed #cbd5e1;
    text-align:center;
}

.support-btn{
    display:inline-block;
    padding:12px 24px;
    border-radius:14px;
    text-decoration:none;
    font-weight:bold;
    background:linear-gradient(135deg,#ffdd00,#facc15);
    color:#000;
}
</style>
</head>
<body>

<div class="ticket">

    <div class="brand-header">
        <div class="brand-name">ABtime</div>
        <div class="brand-tagline">Software • Secure Wi-Fi Ticket</div>
    </div>

    <h1>🎫 WIFI TICKET</h1>

    <div class="input-group">
        <label>📶 Nom du réseau</label>
        <input type="text" id="ssid" value="MonWiFi">
    </div>

    <div class="input-group">
        <label>🔐 Mot de passe</label>
        <div class="input-box">
            <input type="password" id="password" value="BienvenueChezMoi">
            <button class="password-toggle" id="togglePassword">👁</button>
        </div>
    </div>

    <div class="input-group">
        <label>⏳ Heure d’expiration</label>
        <div class="expiry-row">
            <select id="expiryHour"></select>
            <select id="expiryMinute">
                <option value="0">00</option>
                <option value="15">15</option>
                <option value="30">30</option>
                <option value="45">45</option>
            </select>
        </div>
    </div>

    <button class="btn primary" id="generateBtn">🎫 GÉNÉRER</button>
    <button class="btn secondary" id="demoBtn">🧪 DÉMO 3 MIN</button>

    <div id="previewUrl"></div>

    <div class="support-box">
        <a href="https://sellerfit.github.io/wifi-ticket/" target="_blank" class="support-btn">
            ☕ Offrir un café
        </a>
    </div>

</div>

<script>
(function(){

const hourSelect=document.getElementById('expiryHour');

for(let h=0;h<24;h++){
    let option=document.createElement('option');
    option.value=h;
    option.textContent=h.toString().padStart(2,'0');
    hourSelect.appendChild(option);
}
hourSelect.value='23';

document.getElementById('togglePassword').onclick=function(){
    const pwd=document.getElementById('password');
    pwd.type=pwd.type==='password'?'text':'password';
};

async function generateKey(){
    return await crypto.subtle.generateKey(
        {name:"AES-GCM",length:256},
        true,
        ["encrypt","decrypt"]
    );
}

async function encryptData(key,text){
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const encoded=new TextEncoder().encode(text);

    const encrypted=await crypto.subtle.encrypt(
        {name:"AES-GCM",iv},
        key,
        encoded
    );

    const combined=new Uint8Array(iv.length+encrypted.byteLength);
    combined.set(iv,0);
    combined.set(new Uint8Array(encrypted),iv.length);

    return combined;
}

function toBase64(buffer){
    return btoa(String.fromCharCode(...buffer));
}

async function exportKey(key){
    const raw=await crypto.subtle.exportKey("raw",key);
    return toBase64(new Uint8Array(raw));
}

async function createLink(ssid,pwd,exp){
    const payload=JSON.stringify({ssid,pwd,exp});
    const key=await generateKey();
    const encrypted=await encryptData(key,payload);

    const key64=await exportKey(key);
    const data64=toBase64(encrypted);

    const base=window.location.href.replace(/index\.html$/,'').replace(/\/$/,'');

    return base+'/connect.html#'+key64+':'+data64;
}

function getDemoExpiry(){
    return Date.now()+180000;
}

function getExpiryTimestamp(h,m){
    const d=new Date();
    d.setHours(h,m,0,0);
    return d.getTime();
}

async function generate(demo){
    const ssid=document.getElementById('ssid').value.trim();
    const pwd=document.getElementById('password').value.trim();

    const exp=demo
        ? getDemoExpiry()
        : getExpiryTimestamp(
            parseInt(hourSelect.value),
            parseInt(document.getElementById('expiryMinute').value)
        );

    const link=await createLink(ssid,pwd,exp);

    const preview=document.getElementById('previewUrl');
    preview.style.display='block';
    preview.textContent='🔗 '+link;

    preview.onclick=async ()=>{
        await navigator.clipboard.writeText(link);
        alert('Lien copié');
    };
}

document.getElementById('generateBtn').onclick=()=>generate(false);
document.getElementById('demoBtn').onclick=()=>generate(true);

})();
</script>

</body>
</html>
