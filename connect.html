<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Wi-Fi</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

<style>
body{
    background:#2b2b2b;
    font-family:'Courier New', monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:16px;
}

.ticket-receipt{
    max-width:500px;
    width:100%;
    background:#f9f6f0;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

#qrcode{
    margin:20px 0;
}

.ssid-display{
    font-size:1.4rem;
    font-weight:bold;
    margin:10px 0;
}

.pwd-row{
    margin:15px 0;
}

.copy-btn{
    margin-top:10px;
    padding:8px 16px;
    cursor:pointer;
}

.error-msg{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="ticket-receipt">
    <h2>⌁ CONNEXION ⌁</h2>
    <div id="dynamicContent">Chargement...</div>
</div>

<script>
(function(){

    function base64ToArrayBuffer(base64){
        const binary=atob(base64);
        const bytes=new Uint8Array(binary.length);

        for(let i=0;i<binary.length;i++){
            bytes[i]=binary.charCodeAt(i);
        }

        return bytes.buffer;
    }

    async function importKey(key64){
        return await crypto.subtle.importKey(
            "raw",
            base64ToArrayBuffer(key64),
            {name:"AES-GCM"},
            false,
            ["decrypt"]
        );
    }

    async function decryptData(key,data64){
        const combined=base64ToArrayBuffer(data64);
        const arr=new Uint8Array(combined);

        const iv=arr.slice(0,12);
        const cipher=arr.slice(12);

        const decrypted=await crypto.subtle.decrypt(
            {name:"AES-GCM",iv},
            key,
            cipher
        );

        return new TextDecoder().decode(decrypted);
    }

    function generateWifiQR(ssid,pwd){
        const qr=qrcode(0,'M');
        qr.addData(`WIFI:T:WPA;S:${ssid};P:${pwd};;`);
        qr.make();
        return qr.createImgTag(6);
    }

    async function processTicket(){
        const content=document.getElementById('dynamicContent');
        const hash=window.location.hash.substring(1);

        if(!hash){
            content.innerHTML='Aucun ticket';
            return;
        }

        const separatorIndex=hash.indexOf(':');

        if(separatorIndex===-1){
            content.innerHTML='Format invalide';
            return;
        }

        const keyPart=hash.substring(0,separatorIndex);
        const dataPart=hash.substring(separatorIndex+1);

        try{
            const key=await importKey(keyPart);
            const decrypted=await decryptData(key,dataPart);
            const data=JSON.parse(decrypted);

            if(Date.now()>data.exp){
                content.innerHTML='<div class="error-msg">⛔ EXPIRÉ</div>';
                return;
            }

            const timeStr=new Date(data.exp).toLocaleTimeString('fr-FR',{
                hour:'2-digit',
                minute:'2-digit'
            });

            content.innerHTML=`
                <div>✅ VALIDE</div>
                <div id="qrcode">${generateWifiQR(data.ssid,data.pwd)}</div>
                <div class="ssid-display">📶 ${data.ssid}</div>
                <div class="pwd-row">
                    🔑 ${data.pwd}
                </div>
                <div>⌛ Expire à ${timeStr}</div>
            `;

        }catch(e){
            content.innerHTML='Ticket corrompu';
        }
    }

    window.addEventListener('DOMContentLoaded',processTicket);

})();
</script>

</body>
</html>
