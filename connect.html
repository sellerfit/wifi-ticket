<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABtime • Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1e293b;
    font-family:'Courier New', monospace;
    padding:20px;
}
.card{
    background:white;
    max-width:500px;
    width:100%;
    padding:30px;
    border-radius:20px;
    text-align:center;
}
</style>
</head>
<body>
<div class="card">
    <h1>ABtime</h1>
    <div id="dynamicContent">Chargement...</div>
</div>

<script>
(function(){

function base64ToArrayBuffer(base64){
    const binary=atob(base64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    return bytes.buffer;
}

async function importKey(key64){
    return await crypto.subtle.importKey(
        "raw",
        base64ToArrayBuffer(key64),
        {name:"AES-GCM"},
        false,
        ["decrypt"]
    );
}

async function decryptData(key,data64){
    const combined=base64ToArrayBuffer(data64);
    const arr=new Uint8Array(combined);

    const iv=arr.slice(0,12);
    const cipher=arr.slice(12);

    const decrypted=await crypto.subtle.decrypt(
        {name:"AES-GCM",iv},
        key,
        cipher
    );

    return new TextDecoder().decode(decrypted);
}

function generateWifiQR(ssid,pwd){
    const qr=qrcode(0,'M');
    qr.addData(`WIFI:T:WPA;S:${ssid};P:${pwd};;`);
    qr.make();
    return qr.createImgTag(6);
}

async function processTicket(){
    const hash=window.location.hash.substring(1);
    const separator=hash.indexOf(':');

    const keyPart=hash.substring(0,separator);
    const dataPart=hash.substring(separator+1);

    try{
        const key=await importKey(keyPart);
        const decrypted=await decryptData(key,dataPart);
        const data=JSON.parse(decrypted);

        document.getElementById('dynamicContent').innerHTML=`
            <h2>✅ VALIDE</h2>
            <div>${generateWifiQR(data.ssid,data.pwd)}</div>
            <p>📶 ${data.ssid}</p>
            <p>🔐 ${data.pwd}</p>
        `;
    }catch{
        document.getElementById('dynamicContent').innerHTML='Ticket invalide';
    }
}

window.addEventListener('DOMContentLoaded',processTicket);

})();
</script>
</body>
</html>
