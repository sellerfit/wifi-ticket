<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABtime • Wi-Fi Ticket Generator</title>
<style>
body { font-family:'Courier New', monospace; min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#0f172a,#7c3aed); padding:20px; margin:0;}
.ticket { width:100%; max-width:560px; background:white; border-radius:22px; padding:30px; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
.brand-name { text-align:center; font-size:1.6rem; font-weight:800; background:linear-gradient(135deg,#7c3aed,#2563eb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.brand-tagline { text-align:center; font-size:0.78rem; color:#64748b; margin-bottom:20px; text-transform:uppercase; }
.input-group { margin-bottom:22px; }
input, select { width:100%; padding:16px; border:2px solid #cbd5e1; border-radius:14px; font-size:1rem; background:#f8fafc; }
input:focus, select:focus { outline:none; border-color:#7c3aed; box-shadow:0 0 0 4px rgba(124,58,237,0.15); }
.password-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; }
.btn { width:100%; padding:16px; border:none; border-radius:14px; color:white; font-weight:bold; cursor:pointer; margin-top:12px; font-size:1rem; }
.primary { background:linear-gradient(135deg,#7c3aed,#2563eb); }
.secondary { background:linear-gradient(135deg,#f59e0b,#ef4444); }
#previewUrl { margin-top:20px; display:none; background:#f8fafc; border:2px solid #7c3aed; padding:14px; border-radius:14px; word-break:break-all; cursor:pointer; }
.kofi-float{position:fixed;bottom:20px;right:20px;background:#ffdd00;color:black;padding:14px 18px;border-radius:16px;text-decoration:none;font-weight:800;box-shadow:0 10px 30px rgba(0,0,0,0.25);z-index:999;}
</style>
</head>
<body>
<div class="ticket">
  <div class="brand-name">ABtime</div>
  <div class="brand-tagline">Software • Secure Wi-Fi Ticket</div>

  <div class="input-group">
    <label>📶 Nom du réseau</label>
    <input type="text" id="ssid" value="MonWiFi">
  </div>

  <div class="input-group">
    <label>🔐 Mot de passe</label>
    <div style="position:relative;">
      <input type="password" id="password" value="BienvenueChezMoi">
      <button class="password-toggle" id="togglePassword">👁</button>
    </div>
  </div>

  <div class="input-group">
    <label>⏳ Heure d’expiration</label>
    <div style="display:flex; justify-content:center; gap:12px;">
      <select id="expiryHour"></select>
      <span style="font-size:1.5rem;">:</span>
      <select id="expiryMinute">
        <option value="0">00</option>
        <option value="15">15</option>
        <option value="30">30</option>
        <option value="45">45</option>
      </select>
    </div>
  </div>

  <button class="btn primary" id="generateBtn">🎫 GÉNÉRER</button>
  <button class="btn secondary" id="demoBtn">🧪 DÉMO 3 MIN</button>

  <div id="previewUrl"></div>
</div>

<a href="https://ko-fi.com/sellerfit" target="_blank" class="kofi-float">☕ Ko-fi</a>

<script>
(function(){
const hourSelect=document.getElementById('expiryHour');
for(let h=0;h<24;h++){ let o=document.createElement('option'); o.value=h; o.textContent=h.toString().padStart(2,'0'); hourSelect.appendChild(o);}
hourSelect.value='23';

document.getElementById('togglePassword').onclick=function(){
  const pwd=document.getElementById('password');
  pwd.type=pwd.type==='password'?'text':'password';
};

async function generateKey(){return await crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]); }
async function encryptData(key,text){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const encoded=new TextEncoder().encode(text);
  const encrypted=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,encoded);
  const combined=new Uint8Array(iv.length+encrypted.byteLength);
  combined.set(iv,0); combined.set(new Uint8Array(encrypted),iv.length);
  return combined;
}
function toBase64(buf){return btoa(String.fromCharCode(...buf));}
async function exportKey(key){const raw=await crypto.subtle.exportKey("raw",key); return toBase64(new Uint8Array(raw));}
async function createLink(ssid,pwd,exp){
    const payload=JSON.stringify({ssid,pwd,exp});
    const key=await generateKey();
    const encrypted=await encryptData(key,payload);
    const key64=await exportKey(key);
    const data64=toBase64(encrypted);
    const base = window.location.href.replace(/index\.html$/,''); 
    return base + 'connect.html#' + key64 + ':' + data64;
}

function getExpiryTimestamp(h,m){const d=new Date(); d.setHours(h,m,0,0); return d.getTime();}
function getDemoExpiry(){return Date.now()+3*60*1000;}

async function generate(demo){
  const ssid=document.getElementById('ssid').value.trim();
  const pwd=document.getElementById('password').value.trim();
  if(!ssid||!pwd){alert('Remplissez SSID et mot de passe'); return;}
  const exp=demo?getDemoExpiry():getExpiryTimestamp(parseInt(hourSelect.value),parseInt(document.getElementById('expiryMinute').value));
  const link=await createLink(ssid,pwd,exp);
  const preview=document.getElementById('previewUrl');
  preview.style.display='block';
  preview.textContent='🔗 '+link;
  preview.onclick=()=>{navigator.clipboard.writeText(link).then(()=>alert('Lien copié !'));}
}

document.getElementById('generateBtn').onclick=()=>generate(false);
document.getElementById('demoBtn').onclick=()=>generate(true);
})();
</script>
</body>
</html>
