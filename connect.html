<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABtime • Secure Wi-Fi Access</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    font-family:Inter, Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#7c3aed,#2563eb,#0ea5e9);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.app-card{
    width:100%;
    max-width:540px;
    border-radius:30px;
    padding:34px;
    background:rgba(255,255,255,0.94);
    backdrop-filter:blur(18px);
    box-shadow:
        0 30px 80px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.5);
    animation:cardFade .6s ease;
}

@keyframes cardFade{
    from{
        opacity:0;
        transform:translateY(24px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* HEADER */
.brand{
    text-align:center;
    margin-bottom:24px;
}

.logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:14px;
}

.logo{
    width:74px;
    height:74px;
    animation:logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-8px);}
}

.brand-name{
    font-size:1.65rem;
    font-weight:900;
    letter-spacing:1px;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.brand-sub{
    margin-top:6px;
    color:#64748b;
    font-size:.8rem;
    text-transform:uppercase;
    letter-spacing:1px;
}

/* STATUS */
.status-pill{
    display:inline-block;
    margin:16px auto 22px;
    padding:9px 18px;
    border-radius:999px;
    background:#dcfce7;
    color:#166534;
    font-weight:800;
    font-size:.85rem;
}

/* QR */
.qr-shell{
    margin:20px 0;
    padding:24px;
    border-radius:24px;
    background:linear-gradient(145deg,#ffffff,#f8fafc);
    box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.05),
        0 12px 28px rgba(15,23,42,0.08);
}

#qrcode{
    display:flex;
    justify-content:center;
}

#qrcode img{
    width:240px;
    height:240px;
    border-radius:18px;
    padding:12px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* INFO */
.info-card{
    margin-top:20px;
    padding:18px;
    border-radius:18px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
}

.info-row{
    margin-bottom:14px;
}

.label{
    font-size:.78rem;
    color:#64748b;
    text-transform:uppercase;
    margin-bottom:5px;
}

.value{
    font-size:1.05rem;
    font-weight:700;
    color:#0f172a;
}

/* BUTTON */
.copy-btn{
    width:100%;
    margin-top:22px;
    border:none;
    padding:16px;
    border-radius:16px;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    color:white;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    transition:.25s;
}

.copy-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 28px rgba(124,58,237,0.35);
}

.copy-btn.success{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

/* KO-FI */
.kofi-box{
    margin-top:24px;
    text-align:center;
    padding-top:18px;
    border-top:1px solid #e2e8f0;
}

.kofi-btn{
    display:inline-block;
    margin-top:10px;
    padding:12px 22px;
    border-radius:14px;
    background:linear-gradient(135deg,#ffdd00,#facc15);
    color:#000;
    font-weight:800;
    text-decoration:none;
    transition:.25s;
}

.kofi-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(0,0,0,0.15);
}

.expire{
    margin-top:18px;
    text-align:center;
    font-size:.9rem;
    color:#475569;
}
</style>
</head>
<body>

<div class="app-card">
    <div id="dynamicContent">Chargement sécurisé...</div>
</div>

<script>
(function(){

function base64ToArrayBuffer(base64){
    const binary=atob(base64);
    const bytes=new Uint8Array(binary.length);

    for(let i=0;i<binary.length;i++){
        bytes[i]=binary.charCodeAt(i);
    }

    return bytes.buffer;
}

async function importKey(key64){
    return await crypto.subtle.importKey(
        "raw",
        base64ToArrayBuffer(key64),
        {name:"AES-GCM"},
        false,
        ["decrypt"]
    );
}

async function decryptData(key,data64){
    const combined=base64ToArrayBuffer(data64);
    const arr=new Uint8Array(combined);

    const iv=arr.slice(0,12);
    const cipher=arr.slice(12);

    const decrypted=await crypto.subtle.decrypt(
        {name:"AES-GCM",iv},
        key,
        cipher
    );

    return new TextDecoder().decode(decrypted);
}

function generateWifiQR(ssid,pwd){
    const qr=qrcode(0,'M');
    qr.addData(`WIFI:T:WPA;S:${ssid};P:${pwd};;`);
    qr.make();
    return qr.createImgTag(6);
}

function logoSVG(){
    return `
    <svg class="logo" viewBox="0 0 100 100">
        <defs>
            <linearGradient id="abGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#7c3aed"/>
                <stop offset="100%" stop-color="#2563eb"/>
            </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="45" fill="url(#abGrad)"/>
        <path d="M28 64 L40 34 L50 56 L60 28 L72 64"
              fill="none"
              stroke="white"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"/>
        <circle cx="50" cy="50" r="5" fill="white"/>
    </svg>
    `;
}

async function processTicket(){
    const hash=window.location.hash.substring(1);
    const separator=hash.indexOf(':');

    if(separator===-1){
        document.getElementById('dynamicContent').innerHTML='Ticket invalide';
        return;
    }

    const keyPart=hash.substring(0,separator);
    const dataPart=hash.substring(separator+1);

    try{
        const key=await importKey(keyPart);
        const decrypted=await decryptData(key,dataPart);
        const data=JSON.parse(decrypted);

        if(Date.now()>data.exp){
            document.getElementById('dynamicContent').innerHTML='⛔ Ticket expiré';
            return;
        }

        const timeStr=new Date(data.exp).toLocaleTimeString('fr-FR',{
            hour:'2-digit',
            minute:'2-digit'
        });

        document.getElementById('dynamicContent').innerHTML=`
            <div class="brand">
                <div class="logo-wrap">${logoSVG()}</div>
                <div class="brand-name">ABtime</div>
                <div class="brand-sub">Secure Wi-Fi SaaS Access</div>
                <div class="status-pill">✅ ACCESS GRANTED</div>
            </div>

            <div class="qr-shell">
                <div id="qrcode">${generateWifiQR(data.ssid,data.pwd)}</div>
            </div>

            <div class="info-card">
                <div class="info-row">
                    <div class="label">Network</div>
                    <div class="value">📶 ${data.ssid}</div>
                </div>
                <div class="info-row">
                    <div class="label">Password</div>
                    <div class="value">🔐 ${data.pwd}</div>
                </div>
            </div>

            <button class="copy-btn" id="copyBtn">
                📋 Copier le mot de passe
            </button>

            <div class="expire">⌛ Expire à ${timeStr}</div>

            <div class="kofi-box">
                <div>Soutenir ABtime ❤️</div>
                <a class="kofi-btn" href="https://ko-fi.com/VOTRE_PSEUDO_ICI" target="_blank">
                    ☕ Offrir un café
                </a>
            </div>
        `;

        const btn=document.getElementById('copyBtn');

        btn.onclick=async ()=>{
            await navigator.clipboard.writeText(data.pwd);

            btn.classList.add('success');
            btn.innerHTML='✅ Mot de passe copié';

            setTimeout(()=>{
                btn.classList.remove('success');
                btn.innerHTML='📋 Copier le mot de passe';
            },1800);
        };

    }catch{
        document.getElementById('dynamicContent').innerHTML='Ticket corrompu';
    }
}

window.addEventListener('DOMContentLoaded',processTicket);

})();
</script>

</body>
</html>
