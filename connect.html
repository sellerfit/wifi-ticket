<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion Wi-Fi · Ticket Valide</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2b2b2b;
      font-family: 'Courier New', monospace;
      padding: 16px;
    }

    .ticket-receipt {
      width: 100%;
      max-width: 500px;
      background: #f9f6f0;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      color: white;
      background: green;
      border-radius: 8px;
      margin-bottom: 16px;
      font-weight: bold;
    }

    .expired-badge {
      background: darkred;
    }

    #qrcode {
      margin: 20px 0;
      padding: 16px;
      background: white;
      border-radius: 10px;
    }

    .wifi-info {
      margin: 10px 0;
      font-size: 1.1rem;
    }

    .copy-btn {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #5f5544;
      color: white;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .expiry {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="ticket-receipt">
    <h2>⌁ CONNEXION ⌁</h2>
    <div id="dynamicContent">Chargement du ticket...</div>
  </div>

  <script>
    (() => {
      function fromBase64(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);

        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }

        return bytes.buffer;
      }

      async function importKey(key64) {
        return crypto.subtle.importKey(
          'raw',
          fromBase64(key64),
          { name: 'AES-GCM' },
          false,
          ['decrypt']
        );
      }

      async function decryptData(key, data64) {
        const buffer = fromBase64(data64);
        const bytes = new Uint8Array(buffer);

        const iv = bytes.slice(0, 12);
        const cipher = bytes.slice(12);

        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          cipher
        );

        return new TextDecoder().decode(decrypted);
      }

      function generateWifiQR(ssid, pwd) {
        const qr = qrcode(0, 'M');
        qr.addData(`WIFI:T:WPA;S:${ssid};P:${pwd};;`);
        qr.make();
        return qr.createImgTag(6);
      }

      function copyPassword(password) {
        navigator.clipboard.writeText(password)
          .then(() => alert('Mot de passe copié !'))
          .catch(() => alert('Impossible de copier'));
      }

      async function processTicket() {
        const content = document.getElementById('dynamicContent');
        const hash = window.location.hash.substring(1);

        if (!hash) {
          content.innerHTML = '<div>Aucun ticket</div>';
          return;
        }

        const [key64, data64] = hash.split(':');

        try {
          const key = await importKey(key64);
          const decrypted = await decryptData(key, data64);
          const data = JSON.parse(decrypted);

          if (Date.now() > data.exp) {
            content.innerHTML = `
              <div class="status-badge expired-badge">⛔ EXPIRÉ</div>
              <div>Ce ticket n'est plus valide</div>
            `;
            return;
          }

          const timeStr = new Date(data.exp).toLocaleTimeString('fr-FR', {
            hour: '2-digit',
            minute: '2-digit'
          });

          content.innerHTML = `
            <div class="status-badge">✅ VALIDE</div>
            <div id="qrcode">${generateWifiQR(data.ssid, data.pwd)}</div>
            <div class="wifi-info">📶 ${data.ssid}</div>
            <div class="wifi-info">🔑 ${data.pwd}</div>
            <button class="copy-btn" onclick="copyPassword('${data.pwd}')">
              COPIER LE MOT DE PASSE
            </button>
            <div class="expiry">⌛ Expire à ${timeStr}</div>
          `;
        } catch (e) {
          content.innerHTML = '<div>Ticket corrompu</div>';
        }
      }

      window.copyPassword = copyPassword;

      window.addEventListener('DOMContentLoaded', processTicket);
      window.addEventListener('hashchange', processTicket);
    })();
  </script>

</body>
</html>
