<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Connexion Wi-Fi · Ticket Valide</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
    }

    body { 
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #7c3aed 100%);
        background-size: 200% 200%;
        animation: bgMove 10s ease infinite;
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-family: 'Courier New', Courier, monospace; 
        padding: 16px; 
    }

    @keyframes bgMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .ticket { 
        max-width: 500px; 
        width: 100%; 
        background: linear-gradient(145deg, #ffffff, #f8fafc);
        padding: 30px 20px 25px; 
        border-radius: 20px; 
        box-shadow: 
            0 20px 60px rgba(0,0,0,0.35),
            0 0 25px rgba(124,58,237,0.25);
        border: 1px solid rgba(255,255,255,0.4); 
        position: relative;
        animation: floatCard 4s ease-in-out infinite;
        transition: all 0.3s ease;
    }

    .ticket:hover {
        transform: translateY(-5px) scale(1.01);
        box-shadow: 
            0 30px 80px rgba(0,0,0,0.4),
            0 0 35px rgba(124,58,237,0.35);
    }

    @keyframes floatCard {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
    }

    .ticket::before, 
    .ticket::after { 
        content: ""; 
        position: absolute; 
        left: 10px; 
        right: 10px; 
        height: 4px; 
        background: repeating-linear-gradient(
            90deg, 
            #7c3aed, 
            #7c3aed 8px, 
            transparent 8px, 
            transparent 16px
        ); 
    }

    .ticket::before { top: 12px; } 
    .ticket::after { bottom: 12px; }

    h1 { 
        font-size: 2.2rem; 
        font-weight: 700; 
        text-align: center; 
        color: #4c1d95; 
        text-transform: uppercase; 
        border-bottom: 2px dashed #7c3aed; 
        padding-bottom: 10px; 
        margin-bottom: 20px;
        letter-spacing: 2px;
        text-shadow: 0 2px 6px rgba(124,58,237,0.15);
    }

    .subhead { 
        text-align: center; 
        font-size: 0.8rem; 
        color: #475569; 
        margin-top: -15px; 
        margin-bottom: 25px; 
        text-transform: uppercase;
    }

    .input-group { 
        margin-bottom: 20px; 
    }

    label { 
        display: block; 
        font-size: 0.9rem; 
        font-weight: bold; 
        text-transform: uppercase; 
        color: #334155; 
        margin-bottom: 7px; 
    }

    input,
    select {
        width: 100%;
        padding: 13px;
        background: #ffffff;
        border: 2px solid #cbd5e1;
        border-radius: 12px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 1rem;
        transition: all 0.25s ease;
    }

    input:focus,
    select:focus {
        outline: none;
        border-color: #7c3aed;
        box-shadow: 0 0 0 5px rgba(124,58,237,0.18);
        transform: scale(1.01);
    }

    .expiry-row { 
        display: flex; 
        gap: 10px; 
        align-items: center; 
    }

    .expiry-row select, 
    .expiry-row input { 
        flex: 1; 
    }

    .hint { 
        font-size: 0.75rem; 
        color: #64748b; 
        margin-top: 6px; 
        text-align: right; 
    }

    .action-buttons { 
        display: flex; 
        flex-direction: column; 
        gap: 10px; 
        margin: 30px 0 20px; 
    }

    .btn { 
        background: linear-gradient(135deg, #7c3aed, #2563eb);
        border: none; 
        padding: 14px; 
        font-family: 'Courier New', Courier, monospace; 
        font-weight: bold; 
        font-size: 1rem; 
        text-transform: uppercase; 
        color: white; 
        box-shadow: 0 8px 20px rgba(37,99,235,0.35);
        cursor: pointer; 
        text-align: center;
        border-radius: 14px;
        transition: all 0.25s ease;
    }

    .btn:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 12px 28px rgba(124,58,237,0.45);
    }

    .btn:active {
        transform: scale(0.98);
    }

    .btn.secondary { 
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        box-shadow: 0 8px 20px rgba(239,68,68,0.3);
    }

    .demo-area { 
        margin-top: 10px; 
        text-align: center; 
        border-top: 1px dashed #a78bfa; 
        padding-top: 20px; 
    }

    .footer-note {
        margin-top: 12px;
        font-size: 0.75rem;
        color: #475569;
        letter-spacing: 1px;
    }

    #previewUrl { 
        background: linear-gradient(135deg, #ede9fe, #dbeafe);
        padding: 12px; 
        font-size: 0.75rem; 
        word-break: break-all; 
        border: 1px solid #7c3aed; 
        margin-top: 15px; 
        display: none;
        border-radius: 12px;
        animation: fadeInUp 0.45s ease;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(12px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>
<body>
<div class="ticket-receipt"><h2>⌁ CONNEXION ⌁</h2><div id="dynamicContent">Chargement du ticket...</div></div>
<script>
    (function(){
        function base64ToArrayBuffer(b){const bin=atob(b);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes.buffer;}
        async function importKey(k){return await window.crypto.subtle.importKey("raw",base64ToArrayBuffer(k),{name:"AES-GCM"},false,["decrypt"]);}
        async function decryptData(key,combinedB64){const combined=base64ToArrayBuffer(combinedB64);const arr=new Uint8Array(combined);const iv=arr.slice(0,12);const ct=arr.slice(12);const dec=await window.crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);return new TextDecoder().decode(dec);}
        function generateWifiQR(ssid,pwd){const qr=qrcode(0,'M');qr.addData('WIFI:T:WPA;S:'+ssid+';P:'+pwd+';;');qr.make();return qr.createImgTag(6);}
        function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
        async function processTicket(){
            const hash=window.location.hash.substring(1); if(!hash){document.getElementById('dynamicContent').innerHTML='<div class="error-msg">Aucun ticket</div>';return;}
            const parts=hash.split(':'); if(parts.length!==2){document.getElementById('dynamicContent').innerHTML='<div class="error-msg">Format invalide</div>';return;}
            try{
                const key=await importKey(parts[0]); const dec=await decryptData(key,parts[1]); const data=JSON.parse(dec);
                const {ssid,pwd,exp}=data; const now=Date.now(); const content=document.getElementById('dynamicContent');
                if(now>exp){ content.innerHTML='<div class="status-badge expired-badge">⛔ EXPIRÉ</div><div style="padding:25px"><div style="font-size:4rem">⌛</div><div class="error-msg">Ticket expiré le '+new Date(exp).toLocaleTimeString('fr-FR')+'</div></div>'; return; }
                const timeStr=new Date(exp).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
                content.innerHTML='<div class="status-badge">✅ VALIDE</div><div id="qrcode">'+generateWifiQR(ssid,pwd)+'</div><div class="ssid-display">📶 '+escapeHtml(ssid)+'</div><div class="pwd-row"><span class="pwd-text">🔑 '+escapeHtml(pwd)+'</span><button class="copy-btn" id="copyPasswordBtn">COPIER</button></div><div class="expiry-info">⌛ Expire à '+timeStr+'</div>';
                document.getElementById('copyPasswordBtn').addEventListener('click',()=>{ navigator.clipboard?.writeText(pwd).then(()=>alert('Copié !')).catch(()=>prompt('Copie manuelle:',pwd)); });
            }catch(e){ document.getElementById('dynamicContent').innerHTML='<div class="error-msg">Ticket corrompu</div>'; }
        }
        window.addEventListener('DOMContentLoaded',processTicket); window.addEventListener('hashchange',processTicket);
    })();
</script>
</body>
</html>
